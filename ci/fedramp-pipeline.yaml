#
# On manual trigger, this fedramp-pipeline will build a operator image and pass it over to a container registry and
# create a kubernetes manifest-file collecting all the resources needed.
---
vars:
  prerelease-registry: &prerelease-registry
    repository: delivery.instana.io/int-docker-agent-fedramp-prerelease-local/fedramp-v1.0.0/instana-agent-operator/
    tag: main
    username: ((delivery-instana-io-internal-project-artifact-read-writer-creds.username))
    password: ((delivery-instana-io-internal-project-artifact-read-writer-creds.password))

  release-registry: &release-registry
    repository: delivery.instana.io/int-generic-agent-fedramp-release-local/fedramp-v1.0.0/instana-agent-operator/
    tag: main
    username: ((delivery-instana-io-internal-project-artifact-read-writer-creds.username))
    password: ((delivery-instana-io-internal-project-artifact-read-writer-creds.password))

resources:
  # Actual instana-agent-operator git source code
  - name: source-code
    type: git
    icon: github
    source:
      uri: https://github.com/instana/instana-agent-operator.git
      branch: main
      username: instanacd
      password: ((instanacd-github-api-token))

  # Images to be built and pushed to the prerelease registry
  - name: instana-agent-operator-fedramp-image-amd64
    type: registry-image
    icon: docker
    source:
      <<: *prerelease-registry
  - name: isntana-agent-operator-fedramp-image-arm64
    type: registry-image
    icon: docker
    source:
      <<: *prerelease-registry
  - name: instana-agent-operator-fedramp-image-ppc64le
    type: registry-image
    icon: docker
    source:
      <<: *prerelease-registry
  - name: instana-agent-operator-fedramp-image-s390x
    type: registry-image
    icon: docker
    source:
      <<: *prerelease-registry

jobs:
  - name: build-and-push-multiarch-fedramp-image
    max_in_flight: 1
    plan:
      - get: source-code
        trigger: false
      - load_var: agent-operator-version
        file: source-code/.git/ref
        reveal: true
      - load_var: git-commit
        file: source-code/.git/HEAD
        reveal: true
      - in_parallel:
          fail_fast: true
          steps:
            - task: build-amd64
              privileged: true
              file: source-code/ci/container-image-build-task.yaml
              input_mapping:
                source: source-code
              output_mapping:
                image: image-amd64
              vars:
                dockerfile: Dockerfile
                target-platform: linux/amd64
                version: ((.:agent-operator-version))
                git-commit: ((.:git-commit))
            - task: build-arm64
              privileged: true
              file: source-code/ci/container-image-build-task.yaml
              input_mapping:
                source: source-code
              output_mapping:
                image: image-arm64
              vars:
                dockerfile: Dockerfile
                target-platform: linux/arm64
                version: ((.:agent-operator-version))
                git-commit: ((.:git-commit))
            - task: build-s390x
              privileged: true
              file: source-code/ci/container-image-build-task.yaml
              input_mapping:
                source: source-code
              output_mapping:
                image: image-s390x
              vars:
                dockerfile: Dockerfile
                target-platform: linux/s390x
                version: ((.:agent-operator-version))
                git-commit: ((.:git-commit))
            - task: build-ppc64le
              privileged: true
              file: source-code/ci/container-image-build-task.yaml
              input_mapping:
                source: source-code
              output_mapping:
                image: image-ppc64le
              vars:
                dockerfile: Dockerfile
                target-platform: linux/ppc64le
                version: ((.:agent-operator-version))
                git-commit: ((.:git-commit))
      - task: create-tag-files
        privileged: true
        file: source-code/ci/create-tag-file.yaml
        vars:
          git-commit: ((.:git-commit))
          version: ((.:agent-operator-version))
      - in_parallel:
          fail_fast: true
          steps:
            - put: agent-operator-image-amd64
              params:
                image: image-amd64/image.tar
                additional_tags: image-tags/amd64
            - put: agent-operator-image-arm64
              params:
                image: image-arm64/image.tar
                additional_tags: image-tags/arm64
            - put: agent-operator-image-ppc64le
              params:
                image: image-ppc64le/image.tar
                additional_tags: image-tags/ppc64le
            - put: agent-operator-image-s390x
              params:
                image: image-s390x/image.tar
                additional_tags: image-tags/s390x
      - task: publish-manifest-list
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: delivery.instana.io/int-docker-agent-local/instana-agent-operator/e2e-test-base-image
              tag: main
              username: ((delivery-instana-io-internal-project-artifact-read-writer-creds.username))
              password: ((delivery-instana-io-internal-project-artifact-read-writer-creds.password))
          outputs:
            - name: manifest-list
          params:
            GIT_COMMIT: ((.:git-commit))
            ARTIFACTORY_USERNAME_INTERNAL: ((delivery-instana-io-internal-project-artifact-read-writer-creds.username))
            ARTIFACTORY_PASSWORD_INTERNAL: ((delivery-instana-io-internal-project-artifact-read-writer-creds.password))
            PRERELEASE_REGISTRY: ((prerelease-registry))
          run:
            path: bash
            args:
              - -ceu
              - |
                IMAGE_TAG=${GIT_COMMIT}
                OPERATOR_IMAGE_LOCATION={PRERELEASE_REGISTRY.repository}

                manifest-tool \
                  --username ${ARTIFACTORY_USERNAME_INTERNAL} \
                  --password ${ARTIFACTORY_PASSWORD_INTERNAL} \
                  push from-args \
                  --platforms linux/amd64,linux/arm64,linux/ppc64le,linux/s390x \
                  --template ${OPERATOR_IMAGE_LOCATION}:${IMAGE_TAG}-ARCH \
                  --target ${OPERATOR_IMAGE_LOCATION}:${IMAGE_TAG} | tee manifest-output.txt

                OPERATOR_IMG_DIGEST=$(awk '{ print $2 }' manifest-output.txt)
                echo "OPERATOR_IMG_DIGEST=$OPERATOR_IMG_DIGEST"
                # folder is created by output defintion
                echo ${OPERATOR_IMG_DIGEST} > manifest-list/digest
      - put: agent-operator-image-manifest-sha
        params:
          directory: manifest-list
      - task: push-images-to-release-registry
        plan:
          - task: build-multiarch-manifest
            privileged: true
            config:
              platform: linux
              image_resource:
                type: registry-image
                source:
                  repository: delivery.instana.io/int-docker-agent-local/instana-agent-operator/e2e-test-base-image
                  tag: main
                  username: ((delivery-instana-io-internal-project-artifact-read-writer-creds.username))
                  password: ((delivery-instana-io-internal-project-artifact-read-writer-creds.password))
              inputs:
                - name: agent-operator-image-manifest-sha
              params:
                GIT_COMMIT: ((.:git-commit))
                VERSION: ((.:operator-version))
                ARTIFACTORY_USERNAME_INTERNAL: ((delivery-instana-io-internal-project-artifact-read-writer-creds.username))
                ARTIFACTORY_PASSWORD_INTERNAL: ((delivery-instana-io-internal-project-artifact-read-writer-creds.password))
                ARTIFACTORY_USERNAME: ((delivery-instana-io-release-project-artifact-read-writer-creds.username))
                ARTIFACTORY_PASSWORD: ((delivery-instana-io-release-project-artifact-read-writer-creds.password))
                ARTIFACTORY_CONTAINER_DOCKER_URL: ((delivery-artifactory-docker-agent-release-url))
                RELEASE_REGISTRY: ((release-registry))
                PRERELEASE_REGISTRY: ((prerelease-registry))
              run:
                path: bash
                args:
                  - -ceu
                  - |
                    PRERELEASE_REGISTRY={PRERELEASE_REGISTRY.repository}
                    RELEASE_REGISTRY={RELEASE_REGISTRY.repository}
                    DIGEST=$(cat agent-operator-image-manifest-sha/digest)

                    echo "Attempting to copy ${PRERELEASE_REGISTRY} over to the registry ${ARTIFACTORY_REPOSITORY}@${DIGEST}."

                    skopeo copy -a --preserve-digests \
                      --src-username ${ARTIFACTORY_USERNAME_INTERNAL} \
                      --src-password ${ARTIFACTORY_PASSWORD_INTERNAL} \
                      --dest-username ${ARTIFACTORY_USERNAME} \
                      --dest-password ${ARTIFACTORY_PASSWORD} \
                      docker://${PRERELEASE_REGISTRY}@${DIGEST} \
                      docker://${RELEASE_REGISTRY}:main

                    echo "${PRERELEASE_REGISTRY} has been copied over to ${RELEASE_REGISTRY}@${DIGEST} registry successfully."
